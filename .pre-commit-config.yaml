repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff
        args: [check, --fix]
        language: python
        additional_dependencies:
          - ruff>=0.15.13
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: ruff
        args: [format]
        language: python
        additional_dependencies:
          - ruff>=0.15.13
        types: [python]

      - id: ty-check
        name: ty type check
        entry: ty
        args: [check]
        language: python
        additional_dependencies:
          - ty>=0.0.37
          - psutil>=7.2.2
        pass_filenames: false

      - id: mdformat
        name: mdformat
        entry: mdformat
        language: python
        additional_dependencies:
          - mdformat>=0.7.22
        types: [markdown]
