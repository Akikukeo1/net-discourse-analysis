name: Sphinx Docs

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

concurrency:
  group: sphinx-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install tools (use uv)
        run: |
          python -m pip install --upgrade pip
          set -e
          if ! uv sync --dev --locked; then
            echo "Locked sync failed, falling back to resolve from pyproject"
            uv sync --dev
          fi

      - name: Reset Sphinx build directory
        run: rm -rf docs/sphinx/_build

      - name: Generate API docs
        run: uv run sphinx-apidoc -f -s generated.rst -o docs/sphinx src/nda

      - name: Normalize generated API docs
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          root = Path("docs/sphinx")
          for path in root.glob("*.generated.rst"):
              text = path.read_text(encoding="utf-8")
              lines = []
              in_toctree = False

              for line in text.splitlines(keepends=True):
                  stripped = line.strip()
                  if line.startswith(".. toctree::"):
                      in_toctree = True
                      lines.append(line)
                      continue
                  if in_toctree and not line.startswith("   "):
                      in_toctree = False

                  if in_toctree and re.match(r"^   nda(\.[A-Za-z0-9_]+)*$", line):
                      line = f"{line.rstrip()}.generated\n"

                  if in_toctree and stripped == "nda":
                      line = "   nda.generated\n"

                  lines.append(line)

              text = "".join(lines)
              path.write_text(text, encoding="utf-8")
          PY

      - name: Build HTML documentation
        run: uv run sphinx-build -b html docs/sphinx docs/sphinx/_build

      - name: Publish to gh-pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/sphinx/_build
