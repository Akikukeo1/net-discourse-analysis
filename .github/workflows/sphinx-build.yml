name: Sphinx Docs

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: sphinx-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install tools (use uv)
        run: |
          python -m pip install --upgrade pip
          set -e
          if ! uv sync --dev --locked; then
            echo "Locked sync failed, falling back to resolve from pyproject"
            uv sync --dev
          fi

      - name: Reset Sphinx build directory
        run: rm -rf docs/sphinx/_build

      - name: Generate API docs
        run: uv run sphinx-apidoc -f -o docs/sphinx src/nda

      - name: Build HTML documentation
        run: uv run sphinx-build -b html docs/sphinx docs/sphinx/_build

      - name: Commit built artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/sphinx/_build
          if git diff --cached --quiet; then
            echo "No build artifact changes to commit."
            exit 0
          fi
          git commit -m "chore: update Sphinx build artifacts [skip ci]"
          git push
