name: Sphinx Docs

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

concurrency:
  group: sphinx-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install tools (use uv)
        run: |
          python -m pip install --upgrade pip
          set -e
          if ! uv sync --dev --locked; then
            echo "Locked sync failed, falling back to resolve from pyproject"
            uv sync --dev
          fi

      - name: Reset Sphinx build directory
        run: rm -rf docs/sphinx/_build

      - name: Generate API docs
        run: uv run sphinx-apidoc -f -s generated.rst -o docs/sphinx src/nda

      - name: Normalize generated API docs
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("docs/sphinx")
          replacements = {
              "modules.generated.rst": [
                  ("   nda\n", "   nda.generated\n"),
              ],
              "nda.generated.rst": [
                  ("   nda.benchmarks\n", "   nda.benchmarks.generated\n"),
                  ("   nda.collect\n", "   nda.collect.generated\n"),
                  ("   nda.configs\n", "   nda.configs.generated\n"),
                  ("   nda.executors\n", "   nda.executors.generated\n"),
                  ("   nda.hardware\n", "   nda.hardware.generated\n"),
                  ("   nda.models\n", "   nda.models.generated\n"),
                  ("   nda.monitoring\n", "   nda.monitoring.generated\n"),
                  ("   nda.normalization\n", "   nda.normalization.generated\n"),
                  ("   nda.utils\n", "   nda.utils.generated\n"),
                  ("   nda.workers\n", "   nda.workers.generated\n"),
              ],
          }

          for relative_path, rules in replacements.items():
              path = root / relative_path
              text = path.read_text(encoding="utf-8")
              for old_text, new_text in rules:
                  text = text.replace(old_text, new_text)
              path.write_text(text, encoding="utf-8")
          PY

      - name: Build HTML documentation
        run: uv run sphinx-build -b html docs/sphinx docs/sphinx/_build

      - name: Publish to gh-pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/sphinx/_build
