name: CI
on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      RUFF_VERSION: '0.15.13'
      TY_VERSION: '0.0.37'
      PYTEST_VERSION: ''
      TAPLO_VERSION: ''
      MDFORMAT_VERSION: '1.0.0'
    strategy:
      matrix:
        include:
          - task: lint.ruff
            python: '3.13'
          - task: check.ty
            python: '3.13'
          - task: test.pytest
            python: '3.13'
          - task: check.import
            python: '3.13'
          - task: fmt.taplo
            python: '3.13'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install tools (use uv)
        run: |
          python -m pip install --upgrade pip
          uv add ruff==${{ env.RUFF_VERSION }} ty==${{ env.TY_VERSION }} pytest==${{ env.PYTEST_VERSION }} taplo==${{ env.TAPLO_VERSION }} mdformat==${{ env.MDFORMAT_VERSION }}

      - name: "lint.ruff: Ruff check"
        if: matrix.task == 'lint.ruff'
        run: ruff check .

      # `ruff format` は pre-commit の自動修正に委譲しているため CI 側のフォーマットチェックは省略しています.

      - name: "check.ty: Type check (ty)"
        if: matrix.task == 'check.ty'
        run: uv run ty check

      - name: "test.pytest: Pytest"
        if: matrix.task == 'test.pytest'
        run: |
          # テストが存在しない場合は早期終了
          tests_count=$(pytest --collect-only -q | wc -l || true)
          if [ "$tests_count" -eq 0 ]; then
            echo "No tests found, skipping pytest"
            exit 0
          fi
          pytest -q

      - name: "check.import: Import check"
        if: matrix.task == 'check.import'
        run: python -c "import importlib, pkgutil; importlib.import_module('src')"

      - name: "fmt.taplo: Taplo format check"
        if: matrix.task == 'fmt.taplo'
        run: |
          # .toml ファイルをフォーマットチェック
          find . -name '*.toml' -print0 | xargs -0 -r taplo format --check
