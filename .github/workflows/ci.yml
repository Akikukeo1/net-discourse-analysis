name: CI
on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      RUFF_VERSION: '0.15.13'
      TY_VERSION: '0.0.37'
      PYTEST_VERSION: ''
      TAPLO_VERSION: ''
      MDFORMAT_VERSION: '1.0.0'
    name: CI / ${{ matrix.task }} (${{ matrix.python }})
    strategy:
      matrix:
        include:
          - task: ruff-check
            python: '3.12'
          - task: pytest
            python: '3.13'
          - task: import-check
            python: '3.13'
          - task: ty-check
            python: '3.13'
          - task: taplo
            python: '3.13'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install tools (use uv)
        run: |
          python -m pip install --upgrade pip
          # Build uv add argument list only for non-empty version vars
          pkgs=""
          if [ -n "${RUFF_VERSION}" ]; then pkgs="$pkgs ruff==${RUFF_VERSION}"; fi
          if [ -n "${TY_VERSION}" ]; then pkgs="$pkgs ty==${TY_VERSION}"; fi
          if [ -n "${PYTEST_VERSION}" ]; then pkgs="$pkgs pytest==${PYTEST_VERSION}"; fi
          if [ -n "${TAPLO_VERSION}" ]; then pkgs="$pkgs taplo==${TAPLO_VERSION}"; fi
          if [ -n "${MDFORMAT_VERSION}" ]; then pkgs="$pkgs mdformat==${MDFORMAT_VERSION}"; fi
          if [ -z "$pkgs" ]; then echo "No packages to add"; else uv add $pkgs; fi

      - name: "ruff-check: Ruff check"
        if: matrix.task == 'ruff-check'
        run: ruff check .

      # `ruff format` は pre-commit の自動修正に委譲しているため CI 側のフォーマットチェックは省略しています.

      - name: "ty-check: Type check (ty)"
        if: matrix.task == 'ty-check'
        run: uv run ty check

      - name: "pytest: Pytest"
        if: matrix.task == 'pytest'
        run: |
          # テストが存在しない場合は早期終了
          tests_count=$(pytest --collect-only -q | wc -l || true)
          if [ "$tests_count" -eq 0 ]; then
            echo "No tests found, skipping pytest"
            exit 0
          fi
          pytest -q

      - name: "import-check: Import check"
        if: matrix.task == 'import-check'
        run: python -c "import importlib, pkgutil; importlib.import_module('src')"

      - name: "taplo: Taplo format check"
        if: matrix.task == 'taplo'
        run: |
          # .toml ファイルをフォーマットチェック
          find . -name '*.toml' -print0 | xargs -0 -r taplo format --check
