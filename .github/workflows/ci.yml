name: CI
on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    name: CI / ${{ matrix.task }}
    strategy:
      matrix:
        include:
          - task: ruff-check
          - task: pytest
          - task: import-check
          - task: ty-check
          - task: taplo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install tools (use uv)
        run: |
          python -m pip install --upgrade pip
          # Sync project dev dependencies to the environment using uv.
          # Prefer locked sync; fall back to resolving from pyproject if lock missing.
          set -e
          if ! uv sync --dev --locked; then
            echo "Locked sync failed, falling back to resolve from pyproject"
            uv sync --dev
          fi

      - name: "ruff-check: Ruff check"
        if: matrix.task == 'ruff-check'
        run: uv run ruff check .

      # `ruff format` は pre-commit の自動修正に委譲しているため CI 側のフォーマットチェックは省略しています.

      - name: "ty-check: Type check (ty)"
        if: matrix.task == 'ty-check'
        run: uv run ty check

      - name: "pytest: Pytest"
        if: matrix.task == 'pytest'
        run: |
          # テストが存在しない場合は早期終了
          tests_count=$(uv run pytest --collect-only -q | wc -l || true)
          if [ "$tests_count" -eq 0 ]; then
            echo "No tests found, skipping pytest"
            exit 0
          fi
          uv run pytest -q

      - name: "import-check: Import check"
        if: matrix.task == 'import-check'
        run: |
          uv run python -c 'import importlib, pkgutil; importlib.import_module("src")'

      - name: "taplo: Taplo format check"
        if: matrix.task == 'taplo'
        run: |
          # .toml ファイルをフォーマットチェック
          find . -name '*.toml' -print0 | xargs -0 -r -n1 sh -c 'uv run taplo format --check "$0"'
