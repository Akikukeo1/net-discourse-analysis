name: Deploy Sphinx Docs to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install tools (use uv)
        run: |
          python -m pip install --upgrade pip
          set -e
          if ! uv sync --dev --locked; then
            echo "Locked sync failed, falling back to resolve from pyproject"
            uv sync --dev
          fi

      - name: Generate API docs
        run: uv run sphinx-apidoc -f -s generated.rst -o docs/sphinx src/nda

      - name: Normalize generated API docs
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          root = Path("docs/sphinx")
          for path in root.glob("*.generated.rst"):
              text = path.read_text(encoding="utf-8")
              lines = []
              in_toctree = False

              for line in text.splitlines(keepends=True):
                  stripped = line.strip()
                  if line.startswith(".. toctree::"):
                      in_toctree = True
                      lines.append(line)
                      continue
                  if in_toctree and not line.startswith("   "):
                      in_toctree = False

                  if in_toctree and re.match(r"^   nda(\.[A-Za-z0-9_]+)*$", line):
                      line = f"{line.rstrip()}.generated\n"

                  if in_toctree and stripped == "nda":
                      line = "   nda.generated\n"

                  lines.append(line)

              path.write_text("".join(lines), encoding="utf-8")
          PY

      - name: Build HTML documentation
        run: uv run sphinx-build -b html docs/sphinx docs/sphinx/_build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/sphinx/_build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
