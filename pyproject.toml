[project]
name = "net-discourse-analysis"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"

dependencies = ["psutil>=7.2.2", "pyyaml>=6.0.3"]

[dependency-groups]
dev = [
  "ruff>=0.15.13",
  "ty>=0.0.37",
  "taplo>=0.9.3",
  "pre-commit>=4.6.0",
  "mdformat-gfm>=1.0.0",
  "mdformat-frontmatter>=2.0.10",
  "mdformat-tables>=1.0.0",
]

[tool.ruff]
exclude = [".git", ".venv", "build", "dist"]
line-length = 88
indent-width = 4
target-version = "py313"
# NOTE: Ruff は 314 に対応するが、新構文にエコシステムが追いついていないため、313 を指定する。将来的に 314 に変更する。

[tool.ruff.lint]
select = [
  "PGH003",
  "E4",
  "E7",
  "E9",
  "F",
  "TID252",
  "B",
  "I",
  "UP",
  "SIM",
  "RUF",
]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
