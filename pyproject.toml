[project]
name = "net-discourse-analysis"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"

dependencies = ["psutil>=7.2.2"]

[dependency-groups]
dev = [
    "ruff>=0.15.13",
    "ty>=0.0.37",
    "taplo>=0.9.3",
    "pre-commit>=4.6.0",
]

[tool.ruff]
exclude = [".git", ".venv", "build", "dist"]
line-length = 88
indent-width = 4
target-version = "py314"

[tool.ruff.lint]
select = ["PGH003", "E4", "E7", "E9", "F"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
